<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>西语名词词性判断练习</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --panel: #fffdf8;
      --ink: #23211d;
      --muted: #746f66;
      --line: #ddd5c7;
      --accent: #2f6f73;
      --accent-2: #d98947;
      --selected: #244b5a;
      --good: #2f8f5b;
      --bad: rgba(197, 62, 59, 0.3);
      --bad-border: #c53e3b;
      --shadow: 0 18px 45px rgba(35, 33, 29, 0.12);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(47, 111, 115, 0.13), transparent 34%),
        linear-gradient(315deg, rgba(217, 137, 71, 0.14), transparent 34%),
        var(--bg);
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(980px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 18px;
      display: grid;
      place-items: center;
    }

    .screen {
      width: min(720px, 100%);
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(221, 213, 199, 0.95);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(22px, 5vw, 42px);
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 26px;
      color: var(--muted);
      font-size: 15px;
    }

    h1, h2 {
      margin: 0;
      line-height: 1.12;
      letter-spacing: 0;
    }

    h1 {
      font-size: clamp(30px, 8vw, 58px);
      max-width: 10ch;
    }

    h2 {
      font-size: clamp(26px, 6vw, 40px);
    }

    .lead {
      margin: 16px 0 30px;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 18px);
      line-height: 1.65;
    }

    .option-group {
      margin: 22px 0;
    }

    .label {
      margin-bottom: 10px;
      color: var(--muted);
      font-weight: 650;
      font-size: 15px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .segmented.two {
      grid-template-columns: repeat(2, 1fr);
    }

    .choice, .answer-btn, .primary, .secondary {
      min-height: 52px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fffaf0;
      color: var(--ink);
      cursor: pointer;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, color 150ms ease, opacity 150ms ease;
    }

    .choice {
      padding: 12px 14px;
      font-weight: 700;
    }

    .choice.active {
      background: var(--selected);
      border-color: var(--selected);
      color: #fff;
    }

    .primary, .secondary {
      width: 100%;
      padding: 14px 18px;
      font-weight: 800;
    }

    .primary {
      margin-top: 12px;
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .primary:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .secondary {
      background: #fffaf0;
    }

    .quiz-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
    }

    .progress {
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .bar {
      height: 8px;
      width: 100%;
      background: #ede4d5;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 180ms ease;
    }

    .word {
      min-height: 128px;
      display: grid;
      place-items: center;
      text-align: center;
      font-size: clamp(42px, 12vw, 88px);
      font-weight: 850;
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 34px 0 18px;
    }

    .answer-btn {
      min-height: 70px;
      padding: 12px 10px;
      font-weight: 850;
      font-size: clamp(16px, 2.4vw, 19px);
    }

    .answer-btn.selected {
      background: var(--selected);
      border-color: var(--selected);
      color: #fff;
      transform: translateY(-1px);
    }

    .answer-btn.correct {
      background: var(--good);
      border-color: var(--good);
      color: #fff;
      transform: scale(1.055);
      box-shadow: 0 12px 24px rgba(47, 143, 91, 0.22);
    }

    .answer-btn.wrong {
      background: var(--bad);
      border-color: var(--bad-border);
      color: var(--ink);
    }

    .answer-btn:disabled {
      cursor: default;
    }

    .feedback {
      min-height: 28px;
      margin: 6px 0 12px;
      color: var(--muted);
      font-weight: 750;
      text-align: center;
    }

    .feedback.ok { color: var(--good); }
    .feedback.no { color: var(--bad-border); }

    .quiz-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 2fr);
      gap: 10px;
      align-items: stretch;
    }

    .quiz-actions .primary {
      margin-top: 0;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 24px 0 22px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fffaf0;
    }

    .stat strong {
      display: block;
      font-size: clamp(26px, 5vw, 38px);
      line-height: 1;
      margin-bottom: 8px;
    }

    .wrong-list {
      display: grid;
      gap: 10px;
      max-height: min(46vh, 420px);
      overflow: auto;
      padding-right: 4px;
      margin: 18px 0 24px;
    }

    .wrong-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf0;
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .wrong-word {
      font-size: 22px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .wrong-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 250, 240, 0.7);
    }

    @media (max-width: 640px) {
      .app {
        padding: 12px;
        align-items: stretch;
      }

      .screen {
        min-height: calc(100vh - 24px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 22px 16px;
      }

      .segmented, .segmented.two, .answers, .quiz-actions, .summary-grid, .actions {
        grid-template-columns: 1fr;
      }

      .quiz-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .word {
        min-height: 112px;
      }

      .answer-btn {
        min-height: 62px;
      }
    }
  </style>
</head>

word":"visitante","pos":"m.;f.","zh":"来访者","unit":"3"}]};
    const STORE_KEY = "spanish-gender-practice-v1";
    const LABELS = { m: "阳性 (m.)", f: "阴性 (f.)", unsure: "不确定" };
    const ARTICLE_LABELS = {
      m: ["el (m.)"],
      f: ["la (f.)"],
      unsure: ["不确定"]
    };
    const state = {
      view: "start",
      selectedSheet: "现西1",
      order: "original",
      quiz: null,
      selection: new Set()
    };

    const root = document.getElementById("root");

    function cloneAnswer(answer) {
      return { m: !!answer.m, f: !!answer.f };
    }

    function pluralizeSpanish(word) {
      const trimmed = word.trim();
      if (!trimmed) return trimmed;
      const lower = trimmed.toLocaleLowerCase("es");
      if (/[aeiouáéíóú]$/.test(lower)) return trimmed + "s";
      if (/[z]$/.test(lower)) return trimmed.slice(0, -1) + "ces";
      return trimmed + "es";
    }

    function parseGender(pos, word) {
      const raw = String(pos || "").trim();
      if (/m\.\s*\(singular\)\s*f\.\s*\(plural\)/i.test(raw)) {
        return [
          { word, answer: { m: true, f: false }, sourcePos: raw },
          { word: pluralizeSpanish(word), answer: { m: false, f: true }, sourcePos: raw }
        ];
      }
      const withoutParens = raw
        .replace(/\([^)]*\)/g, "")
        .replace(/\bpl\.?\b/gi, "")
        .toLowerCase();
      return [{
        word,
        answer: {
          m: /m\s*\./.test(withoutParens),
          f: /f\s*\./.test(withoutParens)
        },
        sourcePos: raw
      }];
    }

    function questionsForSheet(sheetName) {
      return RAW_DATA[sheetName].flatMap((row, index) =>
        parseGender(row.pos, row.word).map((item, splitIndex) => ({
          id: `${sheetName}-${index}-${splitIndex}-${item.word}`,
          word: item.word,
          baseWord: row.word,
          pos: item.sourcePos,
          zh: row.zh,
          unit: row.unit,
          answer: item.answer
        }))
      ).filter(q => q.answer.m || q.answer.f);
    }

    function shuffle(items) {
      const out = [...items];
      for (let i = out.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [out[i], out[j]] = [out[j], out[i]];
      }
      return out;
    }

    function serialize() {
      return JSON.stringify({
        view: state.view,
        selectedSheet: state.selectedSheet,
        order: state.order,
        quiz: state.quiz,
        selection: [...state.selection]
      });
    }

    function save() {
      localStorage.setItem(STORE_KEY, serialize());
    }

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
        if (!saved || !RAW_DATA[saved.selectedSheet]) return;
        state.view = saved.view || "start";
        state.selectedSheet = saved.selectedSheet || "现西1";
        state.order = saved.order || "original";
        state.quiz = saved.quiz || null;
        state.selection = new Set(saved.selection || []);
      } catch {
        localStorage.removeItem(STORE_KEY);
      }
    }

    function resetToStart() {
      state.view = "start";
      state.quiz = null;
      state.selection = new Set();
      save();
      render();
    }

    function answerToText(answer) {
      if (answer.unsure) return LABELS.unsure;
      const parts = [];
      if (answer.m) parts.push(LABELS.m);
      if (answer.f) parts.push(LABELS.f);
      return parts.length ? parts.join(" + ") : "未选择";
    }

    function currentQuestion() {
      if (!state.quiz) return null;
      return state.quiz.questions[state.quiz.index] || null;
    }

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function assignArticleLabels(question) {
      if (question.articleLabels) return question;
      return {
        ...question,
        articleLabels: {
          m: randomItem(ARTICLE_LABELS.m),
          f: randomItem(ARTICLE_LABELS.f),
          unsure: ARTICLE_LABELS.unsure[0]
        }
      };
    }

    function startQuiz({ questions = null, sheet = state.selectedSheet, order = state.order, redoMode = "all" } = {}) {
      let base = questions || questionsForSheet(sheet);
      const list = (order === "random" ? shuffle(base) : [...base]).map(assignArticleLabels);
      state.view = "quiz";
      state.selectedSheet = sheet;
      state.order = order;
      state.selection = new Set();
      state.quiz = {
        sheet,
        order,
        redoMode,
        index: 0,
        questions: list,
        results: [],
        status: "answer"
      };
      save();
      render();
    }

    function startFromWrong() {
      const wrongs = (state.quiz?.results || []).filter(r => !r.correct).map(r => r.question);
      if (!wrongs.length) return;
      startQuiz({ questions: wrongs, sheet: state.selectedSheet, order: "original", redoMode: "wrong" });
    }

    function selectAnswer(key) {
      if (!state.quiz || state.quiz.status !== "answer") return;
      if (key === "unsure") {
        state.selection = state.selection.has("unsure") ? new Set() : new Set(["unsure"]);
      } else {
        const next = new Set(state.selection);
        next.delete("unsure");
        next.has(key) ? next.delete(key) : next.add(key);
        state.selection = next;
      }
      save();
      render();
    }

    function isSelectionComplete() {
      return state.selection.size > 0;
    }

    function submitAnswer() {
      if (!state.quiz || state.quiz.status !== "answer" || !isSelectionComplete()) return;
      const q = currentQuestion();
      const picked = {
        m: state.selection.has("m"),
        f: state.selection.has("f"),
        unsure: state.selection.has("unsure")
      };
      const correct = !picked.unsure && picked.m === q.answer.m && picked.f === q.answer.f;
      state.quiz.results.push({
        question: q,
        picked,
        correct
      });
      state.quiz.status = "feedback";
      save();
      render();
    }

    function nextQuestion() {
      if (!state.quiz || state.quiz.status !== "feedback") return;
      state.quiz.index += 1;
      state.selection = new Set();
      if (state.quiz.index >= state.quiz.questions.length) {
        state.view = "summary";
      } else {
        state.quiz.status = "answer";
      }
      save();
      render();
    }

    function canGoPreviousQuestion() {
      return state.view === "quiz" && state.quiz && state.quiz.index > 0;
    }

    function previousQuestion() {
      if (!canGoPreviousQuestion()) return;
      const previousIndex = state.quiz.index - 1;
      state.quiz.index = previousIndex;
      state.quiz.results = state.quiz.results.slice(0, previousIndex);
      state.quiz.status = "answer";
      state.selection = new Set();
      save();
      render();
    }

    function renderStart() {
      const total = questionsForSheet(state.selectedSheet).length;
      root.innerHTML = `
        <div class="topline"><span>西班牙语名词</span><span>${total} 题</span></div>
        <h1>词性判断练习</h1>
        <p class="lead">选择一本书和出题顺序，开始后只显示西语单词。刷新页面会保留当前进度。</p>

        <div class="option-group">
          <div class="label">选择 sheet</div>
          <div class="segmented" role="group" aria-label="选择 sheet">
            ${Object.keys(RAW_DATA).map(name => `<button class="choice ${state.selectedSheet === name ? "active" : ""}" data-sheet="${name}">${name}</button>`).join("")}
          </div>
        </div>

        <div class="option-group">
          <div class="label">单词顺序</div>
          <div class="segmented two" role="group" aria-label="选择单词顺序">
            <button class="choice ${state.order === "original" ? "active" : ""}" data-order="original">原序</button>
            <button class="choice ${state.order === "random" ? "active" : ""}" data-order="random">随机</button>
          </div>
        </div>

        <button class="primary" id="startBtn">开始</button>
      `;
      root.querySelectorAll("[data-sheet]").forEach(btn => btn.addEventListener("click", () => {
        state.selectedSheet = btn.dataset.sheet;
        save();
        render();
      }));
      root.querySelectorAll("[data-order]").forEach(btn => btn.addEventListener("click", () => {
        state.order = btn.dataset.order;
        save();
        render();
      }));
      document.getElementById("startBtn").addEventListener("click", () => startQuiz());
    }

    function renderQuiz() {
      let q = currentQuestion();
      if (!q) {
        state.view = "summary";
        save();
        return renderSummary();
      }
      if (!q.articleLabels) {
        q = assignArticleLabels(q);
        state.quiz.questions[state.quiz.index] = q;
        save();
      }
      const total = state.quiz.questions.length;
      const done = state.quiz.index;
      const percent = Math.round((done / total) * 100);
      const last = state.quiz.results[state.quiz.results.length - 1];
      const feedback = state.quiz.status === "feedback" ? (last.correct ? "正确" : `正确答案：${answerToText(q.answer)}`) : "";

      root.innerHTML = `
        <div class="quiz-head">
          <div>
            <div class="topline" style="margin:0"><span>${state.quiz.sheet}</span><span>${state.quiz.order === "random" ? "随机" : "原序"}</span></div>
            <div class="bar" aria-hidden="true"><span style="width:${percent}%"></span></div>
          </div>
          <div class="progress">${done + 1}/${total}</div>
        </div>

        <div class="word">${escapeHtml(q.word)}</div>

        <div class="answers" role="group" aria-label="选择词性">
          ${answerButton("m", q, last)}
          ${answerButton("f", q, last)}
          ${answerButton("unsure", q, last)}
        </div>
        <div class="feedback ${state.quiz.status === "feedback" ? (last.correct ? "ok" : "no") : ""}">${feedback}</div>
        <div class="quiz-actions">
          <button class="secondary" id="previousAction" ${canGoPreviousQuestion() ? "" : "disabled"}>上一题</button>
          <button class="primary" id="mainAction" ${state.quiz.status === "answer" && !isSelectionComplete() ? "disabled" : ""}>${state.quiz.status === "feedback" ? "下一题" : "确认"}</button>
        </div>
      `;

      root.querySelectorAll("[data-answer]").forEach(btn => {
        btn.addEventListener("click", () => selectAnswer(btn.dataset.answer));
      });
      document.getElementById("mainAction").addEventListener("click", () => {
        state.quiz.status === "feedback" ? nextQuestion() : submitAnswer();
      });
      document.getElementById("previousAction").addEventListener("click", previousQuestion);
    }

    function answerButton(key, question, result) {
      const isFeedback = state.quiz.status === "feedback";
      const selected = state.selection.has(key);
      const picked = result?.picked || {};
      let cls = "answer-btn";
      if (!isFeedback && selected) cls += " selected";
      if (isFeedback) {
        if ((key === "m" && question.answer.m) || (key === "f" && question.answer.f)) cls += " correct";
        if (key === "unsure" && picked.unsure) cls += " wrong";
        if ((key === "m" && picked.m && !question.answer.m) || (key === "f" && picked.f && !question.answer.f)) cls += " wrong";
      }
      const shortcuts = { m: "1", f: "2", unsure: "3" };
      const label = question.articleLabels?.[key] || LABELS[key];
      return `<button class="${cls}" data-answer="${key}" ${isFeedback ? "disabled" : ""}>${shortcuts[key]} ${label}</button>`;
    }

    function renderSummary() {
      const results = state.quiz?.results || [];
      const total = results.length;
      const correctCount = results.filter(r => r.correct).length;
      const wrongs = results.filter(r => !r.correct);
      const accuracy = total ? Math.round((correctCount / total) * 100) : 0;
      root.innerHTML = `
        <div class="topline"><span>${state.selectedSheet}</span><span>完成</span></div>
        <h2>练习汇总</h2>
        <div class="summary-grid">
          <div class="stat"><strong>${accuracy}%</strong><span>正确率</span></div>
          <div class="stat"><strong>${correctCount}</strong><span>正确</span></div>
          <div class="stat"><strong>${wrongs.length}</strong><span>错题</span></div>
        </div>
        <div class="label">错题列表</div>
        ${wrongs.length ? `<div class="wrong-list">${wrongs.map(renderWrong).join("")}</div>` : `<div class="empty">没有错题</div>`}
        <div class="actions">
          <button class="secondary" id="redoWrong" ${wrongs.length ? "" : "disabled"}>重做错题</button>
          <button class="secondary" id="redoSheet">重做整个sheet</button>
          <button class="secondary" id="changeSheet">换一个sheet</button>
        </div>
      `;
      document.getElementById("redoWrong").addEventListener("click", startFromWrong);
      document.getElementById("redoSheet").addEventListener("click", () => startQuiz({ sheet: state.selectedSheet, order: state.order }));
      document.getElementById("changeSheet").addEventListener("click", resetToStart);
    }

    function renderWrong(result) {
      return `
        <div class="wrong-item">
          <div class="wrong-word">${escapeHtml(result.question.word)}</div>
          <div class="wrong-meta">
            <span>你的选择：${answerToText(result.picked)}</span>
            <span>正确答案：${answerToText(result.question.answer)}</span>
          </div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[ch]));
    }

    function render() {
      if (state.view === "quiz") return renderQuiz();
      if (state.view === "summary") return renderSummary();
      return renderStart();
    }

    window.addEventListener("keydown", (event) => {
      const shortcutMap = { "1": "m", "2": "f", "3": "unsure" };
      if (shortcutMap[event.key] && state.view === "quiz" && state.quiz?.status === "answer") {
        event.preventDefault();
        return selectAnswer(shortcutMap[event.key]);
      }
      if (event.key !== "Enter") return;
      if (event.shiftKey) {
        event.preventDefault();
        return previousQuestion();
      }
      if (state.view === "start") return startQuiz();
      if (state.view !== "quiz") return;
      event.preventDefault();
      state.quiz.status === "feedback" ? nextQuestion() : submitAnswer();
    });

    load();
    render();
  </script>
</body>
</html>
